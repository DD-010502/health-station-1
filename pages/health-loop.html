<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>环环相扣的健康行为</title>
<!-- Google Fonts 异步加载，不阻塞页面 -->
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<noscript><link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" /></noscript>
<style>
  :root {
    --ink: #2B2A28;
    --paper: #FDF8F5;
    --yellow: #F8D053;
    --orange: #E07A2E;
    --pink:   #CB6851;
    --blue:   #5BB0D4;
    --green:  #799863;
    --shadow: 0 6px 24px -8px rgba(43, 42, 40, .12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", "Liu Jian Mao Cao", "PingFang SC", cursive, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--yellow), var(--pink)); border-radius: 10px; }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%      { transform: translateY(-10px); }
  }
  @keyframes popIn {
    from { opacity: 1; transform: scale(.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 1; }
    to   { opacity: 1; }
  }
  .reveal {
    opacity: 1;
    transform: translateY(0);
    transition: opacity .5s cubic-bezier(.16, 1, .3, 1), transform .5s cubic-bezier(.16, 1, .3, 1);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  .top-nav {
    position: fixed; top: 18px; left: 18px;
    z-index: 60;
  }
  .back-btn {
    background: rgba(255, 255, 255, .85);
    backdrop-filter: blur(10px);
    padding: 10px 18px;
    border-radius: 9999px;
    font-weight: bold;
    color: var(--ink);
    box-shadow: 0 4px 14px rgba(0, 0, 0, .1);
    text-decoration: none;
    font-size: 14px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .25s ease;
  }
  .back-btn:hover { background: #FFFFFF; transform: translateY(-2px); color: var(--orange); }

  .hero {
    position: relative;
    width: 100%;
    height: clamp(280px, 42vh, 460px);
    overflow: hidden;
    background: #FFFFFF;
  }
  .hero-img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: saturate(1.2) contrast(1.05);
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.2) 60%, rgba(0,0,0,.65) 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 44px;
  }
  .hero-overlay h1 {
    margin: 0;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-weight: 400;
    color: #FFFFFF;
    font-size: clamp(28px, 4.2vw, 56px);
    line-height: 1.15;
    text-align: center;
    text-shadow: 0 2px 12px rgba(0, 0, 0, .35);
    letter-spacing: .02em;
  }

  .wave-divider { margin-top: -1px; }
  .wave-divider svg { display: block; width: 100%; height: 60px; }

  .stage {
    max-width: 100%;
    margin: 0 auto;
    padding: 20px 24px 40px;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .stage { grid-template-columns: 1fr; }
  }

  .card {
    background: #FFFFFF;
    border-radius: 18px;
    padding: 24px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-weight: 400;
    font-size: 26px;
    line-height: 1.2;
    color: var(--ink);
  }
  .card .lead {
    color: var(--ink);
    font-size: 15px;
    line-height: 1.7;
  }
  .card .lead strong { color: var(--orange); }

  .module { display: none; }
  .module.active { display: block; animation: popIn .35s ease; }

  .sec-block { margin-top: 18px; }
  .sec-block .sec-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: .6;
    margin-bottom: 8px;
  }
  .sec-block .sec-label .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange);
  }

  .pdf-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 14px;
  }
  .pdf-tile {
    display: flex; gap: 12px; align-items: center;
    background: #FFFFFF;
    border: 1.5px solid rgba(91, 176, 212, .35);
    border-left: 4px solid var(--blue);
    border-radius: 12px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--ink);
    transition: all .25s ease;
    box-shadow: 0 4px 14px -8px rgba(91, 176, 212, .25);
  }
  .pdf-tile:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px -6px rgba(91, 176, 212, .4);
  }
  .pdf-tile .ico {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, #DCEEFB, #C8E4F6);
    color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .pdf-tile .body { flex: 1; min-width: 0; }
  .pdf-tile .body .t2 {
    font-size: 14px;
    font-weight: bold;
    line-height: 1.4;
  }

  .video-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    margin-top: 14px;
  }
  .video-tile {
    background: #FFFFFF;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 6px 20px -10px rgba(203, 104, 81, .25);
    transition: all .3s ease;
    cursor: pointer;
    border: 1.5px solid rgba(203, 104, 81, .15);
  }
  .video-tile:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px -8px rgba(203, 104, 81, .4);
  }
  .video-tile .cover {
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, #FFE6D6 0%, #FFD5C9 100%);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* 有封面图时，cover 用封面做背景 */
  .video-tile.has-cover .cover {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .video-tile.has-cover .cover::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,.35) 100%);
    pointer-events: none;
  }
  .video-tile .cover .play {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255, 255, 255, .9);
    display: flex; align-items: center; justify-content: center;
    color: var(--pink);
    font-size: 22px;
    box-shadow: 0 6px 18px rgba(203, 104, 81, .35);
    transition: transform .25s ease;
  }
  .video-tile:hover .play { transform: scale(1.1); }
  .video-tile .body { padding: 14px 16px; }
  .video-tile .body .t {
    font-size: 14px;
    font-weight: bold;
    line-height: 1.4;
    margin: 0 0 4px;
  }
  .video-tile .body .d {
    font-size: 12px;
    color: var(--ink);
    opacity: .65;
    line-height: 1.5;
  }
  .video-tile .body .meta {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 12px;
    color: var(--ink);
    opacity: .75;
    line-height: 1.5;
  }
  .video-tile .body .meta .by { color: var(--orange); }
  .video-tile .body .meta .intro { color: var(--grey); }

  .toc {
    position: sticky;
    top: 12px;
    background: #FFFFFF;
    border-radius: 18px;
    padding: 20px 14px;
    box-shadow: var(--shadow);
  }
  .toc h3 {
    margin: 0 0 12px;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-weight: 400;
    font-size: 20px;
    color: var(--ink);
  }
  .toc .toc-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    margin: 4px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: all .2s ease;
    font-size: 14px;
    color: var(--ink);
    font-weight: bold;
    border: 1.5px solid transparent;
  }
  .toc .toc-item:hover {
    background: rgba(255, 240, 224, .7);
    transform: translateX(2px);
  }
  .toc .toc-item.active {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: #FFFFFF;
    box-shadow: 0 6px 16px -6px rgba(224, 122, 46, .45);
    transform: translateX(2px);
  }

  .video-modal {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, .55);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .video-modal.open { display: flex; animation: fadeIn .3s ease; }
  .video-modal .frame {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 16px;
    max-width: 820px;
    width: 100%;
    position: relative;
  }
  .video-modal .frame h4 { margin: 0 0 10px; font-size: 16px; }
  .video-modal .frame .aspect {
    aspect-ratio: 16 / 9;
    background: #1B1B1A;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #FFFFFF;
    font-size: 14px;
    overflow: hidden;
  }
  .video-modal .close {
    position: absolute;
    top: -10px; right: -10px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #FFFFFF;
    border: 0;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
  }

  .closing {
    margin-top: 32px;
    text-align: center;
    background: linear-gradient(135deg, #FFE5D2 0%, #FFD0E2 50%, #D2E5FF 100%);
    border-radius: 18px;
    padding: 32px 20px;
  }
  .closing h3 {
    margin: 0 0 8px;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-size: 22px;
    font-weight: 400;
  }
  .closing p { margin: 0; color: var(--ink); font-size: 14px; }
</style>
</head>
<body>

<div class="top-nav">
  <a class="back-btn" href="javascript:window.close()">← 关闭</a>
</div>

<header class="hero">
  <img class="hero-img" src="../assets/images/title2.png" alt="环环相扣的健康行为" />
  <div class="hero-overlay">
    <h1>环环相扣的健康行为</h1>
  </div>
</header>

<div class="wave-divider">
  <svg viewBox="0 0 1440 60" preserveAspectRatio="none">
    <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill="#FDF8F5"/>
  </svg>
</div>

<main class="stage">

  <aside class="toc reveal" aria-label="目录">
    <h3>目录</h3>
    <div class="toc-item active" data-target="loop"><span>环环相扣的健康行为</span></div>
  </aside>

  <section id="content"></section>
</main>

<div class="closing reveal">
  <h3>每一个健康行为，都是下一块的起点</h3>
  <p>回到主页继续探索更多健康小知识 ✨</p>
</div>

<div class="video-modal" id="videoModal">
  <div class="frame">
    <button class="close" id="closeVideo">×</button>
    <h4 id="videoTitle">视频</h4>
    <div class="aspect" id="videoContent"></div>
  </div>
</div>

<script>
/* =====================================================================
   环环相扣的健康行为 · 数据驱动 + 后端追踪
   后端注入: window.CONTENT_DATA = { loop: { intro, pdfs, videos } }
   ===================================================================== */
const DEFAULT_CONTENT = {
  loop: {
    name: '环环相扣的健康行为',
    intro: {
      title: '环环相扣的健康行为',
      paragraphs: [
        '健康行为就像多米诺骨牌——它们不是孤立存在的。<strong>一个健康的选择往往会带动下一个</strong>，形成良性循环。营养饮食让你更有精力去运动，运动会帮助你睡得更好，良好的睡眠又让你第二天更有自控力去选择健康的食物……环环相扣，缺一不可。',
        '反过来也一样：<strong>打破一环，整条链都可能松动</strong>。睡得不好会影响第二天的饮食选择，缺乏运动会让情绪低落，情绪低落又可能导致暴饮暴食或熬夜刷手机。',
        '所以，与其把每个健康行为当成单独的任务，不如把它们看作一个整体系统。<strong>找到最容易入手的那一块</strong>，轻轻推倒第一块骨牌——后面的变化会自然而然发生。',
      ],
    },
    pdfs: [
      { id: 'loop-pdf-1', title: '健康行为的连锁反应', url: '#' },
      { id: 'loop-pdf-2', title: '如何建立良性循环',   url: '#' },
      { id: 'loop-pdf-3', title: '打破恶性循环的方法', url: '#' },
    ],
    videos: [
      { id: 'loop-vid-1', title: '多米诺效应与健康',   desc: '一个微小的改变如何引发连锁反应', url: '#', poster: '' },
      { id: 'loop-vid-2', title: '习惯回路解析',       desc: '线索—行为—奖励，三要素拆解',     url: '#', poster: '' },
      { id: 'loop-vid-3', title: '21 天养成一个习惯？', desc: '科学告诉你真实的习惯形成周期',     url: '#', poster: '' },
    ],
  },
};

let CONTENT = DEFAULT_CONTENT;
(async function loadContent() {
  try {
    const resp = await fetch('../content.json', { cache: 'no-cache' });
    if (resp.ok) {
      const data = await resp.json();
      CONTENT = Object.assign({}, DEFAULT_CONTENT, data);
      if (typeof renderAll === 'function') renderAll();
    }
  } catch (e) {
    console.warn('[content] 加载 content.json 失败，使用默认内容', e);
  }
})();

const CURRENT_USER = (function () {
  try {
    const raw = localStorage.getItem('healthUser');
    if (!raw) return { name: '匿名同学', id: 'anon' };
    const u = JSON.parse(raw);
    return { name: u.name || '匿名同学', id: u.id || 'anon' };
  } catch (e) { return { name: '匿名同学', id: 'anon' }; }
})();

/* Track — 已无后端，改为本地日志 */
const TRACK_DEBUG = !!window.__HEALTH_DEBUG__;
function track(payload) {
  if (TRACK_DEBUG) console.log('[track]', payload);
  try {
    const log = JSON.parse(localStorage.getItem('healthTrackLog') || '[]');
    log.push(Object.assign({ ts: Date.now() }, payload));
    if (log.length > 100) log.splice(0, log.length - 100);
    localStorage.setItem('healthTrackLog', JSON.stringify(log));
  } catch (e) {}
}

const contentEl = document.getElementById('content');
const tocItems = document.querySelectorAll('.toc-item');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}


/* 把相对路径解析为仓库根目录下的完整 URL
 * 关键：GitHub Pages 项目页的根 = origin + /仓库名/ ；
 *      GitHub Pages 用户主页的根 = origin + /
 *      通过检查第一段是否带 .html 区分（项目仓库名不会含 .html） */
function resolveUrl(url) {
  if (!url) return '';
  // 已是绝对 URL，直接返回
  if (/^https?:\/\//i.test(url)) return url;

  // 计算仓库根 URL
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  let repoRoot = window.location.origin + '/';
  // 找第一个"不是 .html 文件"的部分作为仓库名
  const firstNonFile = pathParts.find(p => !p.includes('.html') && !p.includes('.'));
  if (firstNonFile) {
    repoRoot = window.location.origin + '/' + firstNonFile + '/';
  }

  try {
    return new URL(url, repoRoot).href;
  } catch(e) {
    return url;
  }
}
function renderModule(key) {
  const mod = CONTENT[key];
  if (!mod) return '';
  const introParas = mod.intro.paragraphs.map(p => `<p class="lead">${p}</p>`).join('');
  const pdfTiles = (mod.pdfs || []).filter(p => p && p.url && p.url.trim()).map(p => `
    <a class="pdf-tile" href="${escapeHtml(resolveUrl(p.url))}" target="_blank" rel="noopener"
       data-pdf-id="${escapeHtml(p.id)}" data-module-id="${escapeHtml(key)}" data-track-action="open_pdf">
      <div class="ico">📄</div>
      <div class="body"><div class="t2">${escapeHtml(p.title)}</div></div>
    </a>
  `).join('');
  const videoTiles = (mod.videos || [])
    .filter(v => v && v.url && v.url.trim())
    .map(v => {
      const coverUrl = v.cover ? resolveUrl(v.cover) : '';
      return `
    <a class="video-tile ${coverUrl ? 'has-cover' : ''}"
       href="${escapeHtml(resolveUrl(v.url))}"
       target="_blank"
       rel="noopener"
       data-video-id="${escapeHtml(v.id)}"
       data-module-id="${escapeHtml(key)}"
       data-video-url="${escapeHtml(v.url)}"
       data-title="${escapeHtml(v.title)}"
       data-track-action="open_video">
      <div class="cover"${coverUrl ? ` style="background-image: url('${escapeHtml(coverUrl)}');"` : ''}><div class="play">▶</div></div>
      <div class="body">
        <div class="t">${escapeHtml(v.title)}</div>
        <div class="meta">
          ${v.author ? `<span class="by">创作者：${escapeHtml(v.author)}</span>` : ''}
          ${v.intro ? `<span class="intro">${escapeHtml(v.intro)}</span>` : ''}
        </div>
      </div>
    </a>
  `;}).join('');

  return `
    <article class="module" id="mod-${key}" data-key="${key}">
      <div class="card reveal" id="${key}-intro">
        <h2>${escapeHtml(mod.intro.title)}</h2>
        ${introParas}
      </div>
      <div class="card reveal" id="${key}-pdf">
        <div class="sec-block">
          <div class="sec-label"><span class="dot"></span>PDF 学习手册</div>
          <div class="pdf-row">${pdfTiles || '<div class="empty">本模块暂无 PDF</div>'}</div>
        </div>
      </div>
      <div class="card reveal" id="${key}-video">
        <div class="sec-block">
          <div class="sec-label"><span class="dot"></span>趣味视频</div>
          <div class="video-row">${videoTiles || '<div class="empty">本模块暂无视频</div>'}</div>
        </div>
      </div>
    </article>
  `;
}

function renderAll() {
  const keys = ['loop'];
  contentEl.innerHTML = keys.map(renderModule).join('');
  showModule(keys[0]);
  bindEvents();
  observeReveals();
}

function showModule(key) {
  document.querySelectorAll('.module').forEach(m => m.classList.toggle('active', m.dataset.key === key));
  tocItems.forEach(t => t.classList.toggle('active', t.dataset.target === key));
  track({ type: 'view_module', module_id: key });
}

function bindEvents() {
  tocItems.forEach(item => {
    item.addEventListener('click', () => showModule(item.dataset.target));
  });
  document.querySelectorAll('a.pdf-tile[data-track-action="open_pdf"]').forEach(a => {
    a.addEventListener('click', () => {
      track({ type: 'open_pdf', module_id: a.dataset.moduleId, target_id: a.dataset.pdfId, href: a.href });
    });
  });
  document.querySelectorAll('.video-tile[data-track-action="open_video"]').forEach(t => {
    t.addEventListener('click', (e) => {
      const url = t.dataset.videoUrl;
      /* mp4 等视频文件 → 阻止默认跳转，弹 modal 内嵌播放 */
      if (/\.(mp4|webm|mov|m3u8)(\?|$)/i.test(url)) {
        e.preventDefault();
        openVideo(t);
      }
      /* 外链 → 让 <a target="_blank"> 直接跳转，不 preventDefault */
      track({
        type: 'open_video',
        module_id: t.dataset.moduleId,
        target_id: t.dataset.videoId,
        href: url,
      });
    });
  });
}

/* ---------- Video modal ---------- */
const videoModal = document.getElementById('videoModal');
const videoTitle = document.getElementById('videoTitle');
const videoContent = document.getElementById('videoContent');
const closeVideo = document.getElementById('closeVideo');

let currentVideoEl = null, currentVideoMeta = null, watchSessionId = null, lastReportTs = 0;

function openVideo(tile) {
  const meta = { video_id: tile.dataset.videoId, module_id: tile.dataset.moduleId, title: tile.dataset.title, url: tile.dataset.videoUrl, duration: parseInt(tile.dataset.duration || '0', 10) };
  currentVideoMeta = meta;
  watchSessionId = 'sess-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();
  videoTitle.textContent = meta.title;

  if (!meta.url || meta.url === '#') {
    videoContent.innerHTML = `<div style="text-align:center;"><div style="font-size:42px;margin-bottom:10px;">🎬</div><div style="opacity:.75;">视频尚未上传</div><div style="margin-top:8px;font-size:12px;opacity:.55;">${escapeHtml(meta.title)}</div></div>`;
  } else {
    videoContent.innerHTML = `<video id="vidEl" controls preload="metadata" poster="${escapeHtml(meta.poster || '')}" style="width:100%;height:100%;background:#000;" data-video-id="${escapeHtml(meta.video_id)}"><source src="${escapeHtml(meta.url)}"/>您的浏览器不支持 video 标签。</video>`;
    currentVideoEl = document.getElementById('vidEl');
    bindVideoTracking(currentVideoEl, meta);
  }

  track({ type: 'open_video', module_id: meta.module_id, target_id: meta.video_id, session_id: watchSessionId });
  videoModal.classList.add('open');
}

function bindVideoTracking(vid, meta) {
  vid.addEventListener('play',  () => reportWatch('play'));
  vid.addEventListener('pause', () => reportWatch('pause'));
  vid.addEventListener('seeked',() => reportWatch('seek'));
  vid.addEventListener('ended', () => reportWatch('end'));
  vid.addEventListener('timeupdate', () => { if (Date.now() - lastReportTs >= 10000) reportWatch('tick'); });
}

function reportWatch(eventType) {
  if (!currentVideoEl || !currentVideoMeta) return;
  lastReportTs = Date.now();
  const v = currentVideoEl, dur = v.duration || currentVideoMeta.duration || 0, pos = v.currentTime || 0;
  const payload = { type: 'video_watch', session_id: watchSessionId, module_id: currentVideoMeta.module_id, target_id: currentVideoMeta.video_id, video_id: currentVideoMeta.video_id, event: eventType, positionSec: Math.round(pos*10)/10, durationSec: Math.round(dur*10)/10, percent: dur ? Math.min(100, Math.round((pos/dur)*1000)/10) : 0 };
  try {
    // 已无后端，改为本地日志
    const log = JSON.parse(localStorage.getItem('healthVideoLog') || '[]');
    log.push(Object.assign({ ts: Date.now() }, payload));
    if (log.length > 200) log.splice(0, log.length - 200);
    localStorage.setItem('healthVideoLog', JSON.stringify(log));
  } catch (e) {}
  if (TRACK_DEBUG) console.log('[video_watch]', payload);
}

function closeVM() {
  if (currentVideoEl && !currentVideoEl.paused) { reportWatch('close'); currentVideoEl.pause(); }
  videoContent.innerHTML = ''; currentVideoEl = null; currentVideoMeta = null;
  videoModal.classList.remove('open');
}
closeVideo.addEventListener('click', closeVM);
videoModal.addEventListener('click', (e) => { if (e.target === videoModal) closeVM(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeVM(); });

/* ---------- Scroll reveal ---------- */
let io;
function observeReveals() {
  if (!io) { io = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } }); }, { threshold: 0.08 }); }
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
}

renderAll();
</script>
</body>
