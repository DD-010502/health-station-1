<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>健康行为小知识</title>
<!-- Google Fonts 异步加载，不阻塞页面 -->
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<noscript><link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" /></noscript>
<style>
  :root {
    --ink: #2B2A28;
    --paper: #FDF8F5;
    --yellow: #F8D053;
    --orange: #E07A2E;
    --pink:   #CB6851;
    --blue:   #5BB0D4;
    --green:  #799863;
    --shadow: 0 6px 24px -8px rgba(43, 42, 40, .12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", "Liu Jian Mao Cao", "PingFang SC", cursive, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--yellow), var(--pink)); border-radius: 10px; }

  /* ---------- Animations ---------- */
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%      { transform: translateY(-10px); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .reveal {
    opacity: 1;
    transform: translateY(0);
    transition: opacity .5s ease, transform .5s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ---------- Top nav ---------- */
  .top-nav {
    position: fixed; top: 18px; left: 18px;
    z-index: 60;
  }
  .back-btn {
    background: rgba(255, 255, 255, .85);
    backdrop-filter: blur(10px);
    padding: 10px 18px;
    border-radius: 9999px;
    font-weight: bold;
    color: var(--ink);
    box-shadow: 0 4px 14px rgba(0, 0, 0, .1);
    text-decoration: none;
    font-size: 14px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .25s ease;
  }
  .back-btn:hover { background: #FFFFFF; transform: translateY(-2px); color: var(--orange); }

  /* ---------- Hero ---------- */
  .hero {
    position: relative;
    width: 100%;
    height: clamp(280px, 42vh, 460px);
    overflow: hidden;
    background: #FFFFFF;
  }
  .hero-img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: saturate(1.2) contrast(1.05);
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.2) 60%, rgba(0,0,0,.65) 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 44px;
  }
  .hero-overlay h1 {
    margin: 0;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-weight: 400;
    color: #FFFFFF;
    font-size: clamp(28px, 4.2vw, 56px);
    line-height: 1.15;
    text-align: center;
    text-shadow: 0 2px 12px rgba(0, 0, 0, .35);
    letter-spacing: .02em;
  }

  .wave-divider { margin-top: -1px; }
  .wave-divider svg { display: block; width: 100%; height: 60px; }

  /* ---------- Layout: TOC on left, content on right ---------- */
  .stage {
    max-width: 100%;
    margin: 0 auto;
    padding: 20px 24px 40px;
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .stage { grid-template-columns: 1fr; }
  }

  /* ---------- Cards ---------- */
  .card {
    background: #FFFFFF;
    border-radius: 18px;
    padding: 24px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-weight: 400;
    font-size: 26px;
    line-height: 1.2;
    color: var(--ink);
  }
  .card .lead {
    color: var(--ink);
    font-size: 15px;
    line-height: 1.7;
  }
  .card .lead strong { color: var(--orange); }

  /* ---------- Module content ---------- */
  .module { display: none; }
  .module.active { display: block; animation: popIn .35s ease; }

  .sec-block { margin-top: 18px; }
  .sec-block .sec-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: .6;
    margin-bottom: 8px;
  }
  .sec-block .sec-label .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange);
  }

  /* ---------- PDF cards ---------- */
  .pdf-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 14px;
  }
  .pdf-tile {
    display: flex; gap: 12px; align-items: center;
    background: #FFFFFF;
    border: 1.5px solid rgba(91, 176, 212, .35);
    border-left: 4px solid var(--blue);
    border-radius: 12px;
    padding: 14px 16px;
    text-decoration: none;
    color: var(--ink);
    transition: all .25s ease;
    box-shadow: 0 4px 14px -8px rgba(91, 176, 212, .25);
  }
  .pdf-tile:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px -6px rgba(91, 176, 212, .4);
  }
  .pdf-tile .ico {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, #DCEEFB, #C8E4F6);
    color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .pdf-tile .body { flex: 1; min-width: 0; }
  .pdf-tile .body .t2 {
    font-size: 14px;
    font-weight: bold;
    line-height: 1.4;
  }

  /* ---------- Video cards ---------- */
  .video-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    margin-top: 14px;
  }
  .video-tile {
    background: #FFFFFF;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 6px 20px -10px rgba(203, 104, 81, .25);
    transition: all .3s ease;
    cursor: pointer;
    border: 1.5px solid rgba(203, 104, 81, .15);
  }
  .video-tile:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px -8px rgba(203, 104, 81, .4);
  }
  .video-tile .cover {
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, #FFE6D6 0%, #FFD5C9 100%);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* 有封面图时，cover 用封面做背景；中央播放图标 + 黑色蒙层 */
  .video-tile.has-cover .cover {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .video-tile.has-cover .cover::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,.35) 100%);
    pointer-events: none;
  }
  .video-tile .cover .play {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255, 255, 255, .9);
    display: flex; align-items: center; justify-content: center;
    color: var(--pink);
    font-size: 22px;
    box-shadow: 0 6px 18px rgba(203, 104, 81, .35);
    transition: transform .25s ease;
  }
  .video-tile:hover .play { transform: scale(1.1); }
  .video-tile .body { padding: 14px 16px; }
  .video-tile .body .t {
    font-size: 14px;
    font-weight: bold;
    line-height: 1.4;
    margin: 0 0 4px;
  }
  .video-tile .body .d {
    font-size: 12px;
    color: var(--ink);
    opacity: .65;
    line-height: 1.5;
  }
  .video-tile .body .meta {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 12px;
    color: var(--ink);
    opacity: .75;
    line-height: 1.5;
  }
  .video-tile .body .meta .by { color: var(--orange); }
  .video-tile .body .meta .intro { color: var(--grey); }

  /* ---------- TOC ---------- */
  .toc {
    position: sticky;
    top: 12px;
    background: #FFFFFF;
    border-radius: 18px;
    padding: 16px 14px;
    box-shadow: var(--shadow);
  }
  .toc h3 {
    margin: 0 0 12px;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-weight: 400;
    font-size: 20px;
    color: var(--ink);
  }
  .toc .toc-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    margin: 4px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: all .2s ease;
    font-size: 14px;
    color: var(--ink);
    font-weight: bold;
    border: 1.5px solid transparent;
  }
  .toc .toc-item:hover {
    background: rgba(255, 240, 224, .7);
    transform: translateX(2px);
  }
  .toc .toc-item.active {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: #FFFFFF;
    box-shadow: 0 6px 16px -6px rgba(224, 122, 46, .45);
    transform: translateX(2px);
  }

  /* ---------- Video modal ---------- */
  .video-modal {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, .55);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .video-modal.open { display: flex; animation: fadeIn .3s ease; }
  .video-modal .frame {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 16px;
    max-width: 820px;
    width: 100%;
    position: relative;
  }
  .video-modal .frame h4 { margin: 0 0 10px; font-size: 16px; }
  .video-modal .frame .aspect {
    aspect-ratio: 16 / 9;
    background: #1B1B1A;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #FFFFFF;
    font-size: 14px;
    overflow: hidden;
  }
  .video-modal .close {
    position: absolute;
    top: -10px; right: -10px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #FFFFFF;
    border: 0;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
  }

  /* ---------- Footer ---------- */
  .closing {
    margin-top: 32px;
    text-align: center;
    background: linear-gradient(135deg, #FFE5D2 0%, #FFD0E2 50%, #D2E5FF 100%);
    border-radius: 18px;
    padding: 32px 20px;
  }
  .closing h3 {
    margin: 0 0 8px;
    font-family: "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-size: 22px;
    font-weight: 400;
  }
  .closing p { margin: 0; color: var(--ink); font-size: 14px; }
</style>
</head>
<body>

<div class="top-nav">
  <a class="back-btn" href="../index.html">← 返回主页</a>
</div>

<header class="hero">
  <img class="hero-img" src="../assets/images/title1.jpg" alt="健康小站封面" />
  <div class="hero-overlay">
    <h1>健康行为小知识</h1>
  </div>
</header>

<div class="wave-divider">
  <svg viewBox="0 0 1440 60" preserveAspectRatio="none">
    <path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill="#FDF8F5"/>
  </svg>
</div>

<main class="stage">

  <!-- TOC -->
  <aside class="toc reveal" aria-label="目录">
    <h3>目录</h3>
    <div class="toc-item active" data-target="diet"><span>营养饮食</span></div>
    <div class="toc-item" data-target="exercise"><span>积极运动</span></div>
    <div class="toc-item" data-target="sleep"><span>良好睡眠</span></div>
    <div class="toc-item" data-target="screen"><span>合理视屏</span></div>
    <div class="toc-item" data-target="habits"><span>禁烟禁酒</span></div>
    <div class="toc-item" data-target="mental"><span>心理健康</span></div>
  </aside>

  <!-- Module content rendered by JS -->
  <section id="content"></section>
</main>

<div class="closing reveal">
  <h3>健康不是一时兴起，而是日复一日的小选择</h3>
  <p>看完任一板块，回到主页完成今日打卡 ✨</p>
</div>

<!-- Video modal -->
<div class="video-modal" id="videoModal">
  <div class="frame">
    <button class="close" id="closeVideo">×</button>
    <h4 id="videoTitle">视频</h4>
    <div class="aspect" id="videoContent"></div>
  </div>
</div>

<script>
/* =====================================================================
   健康行为小知识 · 数据驱动 + 后端追踪
   ---------------------------------------------------------------------
   数据来源:
     1. window.CONTENT_DATA  ← 后端注入覆盖
     2. 本地 DEFAULT_CONTENT ← fallback
   所有 PDF/视频都带 data-pdf-id / data-video-id / data-module-id,
   点击统一走 track() 上报。后端接入后替换 CONTENT_DATA 即可。
   ===================================================================== */

/* =====================================================================
   DEFAULT_CONTENT — 本地静态数据，后端接入后由 window.CONTENT_DATA 覆盖
   结构说明（供后端参考）：
   {
     <moduleId>: {
       name: '模块名称',
       intro: { title: '卷首语标题', paragraphs: ['段落1','段落2',...] },
       pdfs:  [{ id, title, url }],   // url 由后端上传到 OSS 后填入
       videos:[{ id, title, desc, url, poster }],
     }
   }
   ===================================================================== */
const DEFAULT_CONTENT = {
  diet: {
    name: '营养饮食',
    intro: {
      title: '营养饮食 · 吃对每一餐',
      paragraphs: [
        '饮食是健康的地基。青少年阶段（12–18 岁）正处于身体快速发育期，需要充足的<strong>蛋白质、钙、铁、锌</strong>，以及丰富的蔬菜水果提供维生素和膳食纤维。',
        '建议每天：<br/>• 早餐必吃（占全天能量 25–30%）<br/>• 一日三餐定时定量，不漏餐<br/>• 每天 300–500g 蔬菜 + 200–350g 水果<br/>• 每天饮水 1200–1400ml，少喝含糖饮料',
      ],
    },
    pdfs: [
      { id: 'diet-pdf-1', title: '青少年膳食指南手册', url: '#' },
      { id: 'diet-pdf-2', title: '三餐搭配实用图表',     url: '#' },
      { id: 'diet-pdf-3', title: '零食挑选避坑指南',     url: '#' },
    ],
    videos: [
      { id: 'diet-vid-1', title: '营养早餐怎么搭？',  desc: '3 分钟学会 5 种快手早餐',      url: '#', poster: '' },
      { id: 'diet-vid-2', title: '读懂食品营养标签',  desc: '挑零食不再被花哨包装忽悠',    url: '#', poster: '' },
      { id: 'diet-vid-3', title: '学生一周餐盘示范',  desc: '跟着营养师吃一周看看变化',    url: '#', poster: '' },
    ],
  },
  exercise: {
    name: '积极运动',
    intro: {
      title: '积极运动 · 每天动一动',
      paragraphs: [
        'WHO 建议青少年每天累计 <strong>60 分钟</strong>中等强度以上运动（如快走、骑车、跳绳），每周 3 次加强肌肉和骨骼的活动（俯卧撑、引体向上、跳绳等）。',
        '运动不是惩罚式地"逼自己"，而是找到让自己舒服的节奏：可以是上下学走路、课间跳绳、周末打球、睡前拉伸。<strong>把运动拆成小块</strong>塞进一天，更容易坚持。',
      ],
    },
    pdfs: [
      { id: 'ex-pdf-1', title: '青少年运动指南',         url: '#' },
      { id: 'ex-pdf-2', title: '课间 5 分钟拉伸图解',    url: '#' },
      { id: 'ex-pdf-3', title: '一周运动打卡表',         url: '#' },
    ],
    videos: [
      { id: 'ex-vid-1', title: '课间 5 分钟拉伸',   desc: '跟着做，眼睛脖子都舒服',     url: '#' },
      { id: 'ex-vid-2', title: '居家燃脂训练',     desc: '不需要器械，每天 10 分钟',     url: '#' },
      { id: 'ex-vid-3', title: '运动前后怎么吃',   desc: '吃对时间，比吃得多更重要',     url: '#' },
    ],
  },
  sleep: {
    name: '良好睡眠',
    intro: {
      title: '良好睡眠 · 睡好才有力气',
      paragraphs: [
        '青少年每天需要 <strong>8–10 小时</strong>睡眠。生长激素在深度睡眠时分泌最旺盛，长期睡不够会影响身高、记忆力和情绪。',
        '改善睡眠的小动作：<br/>• 固定时间上床、起床（哪怕周末）<br/>• 睡前 1 小时放下手机<br/>• 房间保持凉爽、安静、黑暗<br/>• 下午 3 点后不再喝咖啡、浓茶',
      ],
    },
    pdfs: [
      { id: 'sleep-pdf-1', title: '青少年睡眠白皮书',   url: '#' },
      { id: 'sleep-pdf-2', title: '睡前放松训练手册',   url: '#' },
      { id: 'sleep-pdf-3', title: '一周睡眠记录表',     url: '#' },
    ],
    videos: [
      { id: 'sleep-vid-1', title: '10 分钟睡前放松',  desc: '呼吸 + 渐进式肌肉放松',       url: '#' },
      { id: 'sleep-vid-2', title: '戒掉睡前手机',    desc: '替代清单 + 21 天挑战',         url: '#' },
      { id: 'sleep-vid-3', title: '认识生物钟',      desc: '什么是昼夜节律？',             url: '#' },
    ],
  },
  screen: {
    name: '合理视屏',
    intro: {
      title: '合理视屏 · 屏幕之外有天地',
      paragraphs: [
        '青少年每天面对屏幕的时间越来越长——手机、平板、电脑、电视。<strong>过度使用屏幕</strong>不仅影响视力，还会压缩运动、睡眠和面对面社交的时间。',
        '合理视屏的建议：<br/>• 非学习用途屏幕时间每天不超过 2 小时<br/>• 每 20 分钟看屏幕，向 6 米外看 20 秒<br/>• 睡前一小时放下所有电子设备<br/>• 把手机"请"出卧室，用闹钟代替手机闹铃',
      ],
    },
    pdfs: [
      { id: 'scr-pdf-1', title: '青少年视屏管理手册',     url: '#' },
      { id: 'scr-pdf-2', title: '护眼小贴士与眼保健操',   url: '#' },
      { id: 'scr-pdf-3', title: '替代屏幕的 20 种活动',   url: '#' },
    ],
    videos: [
      { id: 'scr-vid-1', title: '屏幕时间怎么降下来？', desc: '学会和手机「和平分手」',    url: '#' },
      { id: 'scr-vid-2', title: '护眼小运动',           desc: '每天 5 分钟让眼睛放松',      url: '#' },
      { id: 'scr-vid-3', title: '放下手机能做什么？',   desc: '20 个不插电的有趣活动',      url: '#' },
    ],
  },
  habits: {
    name: '禁烟禁酒',
    intro: {
      title: '禁烟禁酒 · 学会说"不"',
      paragraphs: [
        '青少年的大脑仍在发育，<strong>尼古丁和酒精对发育中的大脑伤害更大</strong>，更容易成瘾，也更影响记忆力和情绪控制。',
        '面对同伴递烟劝酒时，记住三个"不"：<br/>• <strong>直接拒绝</strong>：不需要理由，简单说"我不抽烟/酒"<br/>• <strong>找借口离开</strong>："我妈等我回家，我先走了"<br/>• <strong>找同盟</strong>：和真正不抽烟不喝酒的朋友一起玩',
      ],
    },
    pdfs: [
      { id: 'hab-pdf-1', title: '青少年吸烟危害图鉴',       url: '#' },
      { id: 'hab-pdf-2', title: '酒精对青少年大脑的影响',   url: '#' },
      { id: 'hab-pdf-3', title: '拒绝烟酒的 10 种说法',     url: '#' },

/* 内容从 content.json 异步加载（fetch 自动选绝对或相对路径） */
let CONTENT = DEFAULT_CONTENT;  // 初始用默认值，fetch 成功后覆盖

// 异步加载 content.json（无后端，配置文件驱动）
(async function loadContent() {
  try {
    const resp = await fetch('../content.json', { cache: 'no-cache' });
    if (resp.ok) {
      const data = await resp.json();
      // 合并：content.json 中的字段覆盖 DEFAULT_CONTENT
      CONTENT = Object.assign({}, DEFAULT_CONTENT, data);
      // 如果已有 renderAll，调用一次刷新
      if (typeof renderAll === 'function') renderAll();
    }
  } catch (e) {
    console.warn('[content] 加载 content.json 失败，使用默认内容', e);
  }
})();

/* =====================================================================
   Current user — 已无昵称系统，留默认值

const CURRENT_USER = { name: '匿名同学', id: 'anon' };

/* =====================================================================
   Track — 已无后端，改为本地日志（不再上报）
   ===================================================================== */
const TRACK_DEBUG = !!window.__HEALTH_DEBUG__;
function track(payload) {
  if (TRACK_DEBUG) console.log('[track]', payload);
  // 改为本地日志（不再发送网络请求）
  try {
    const log = JSON.parse(localStorage.getItem('healthTrackLog') || '[]');
    log.push(Object.assign({ ts: Date.now() }, payload));
    // 只保留最近 100 条
    if (log.length > 100) log.splice(0, log.length - 100);
    localStorage.setItem('healthTrackLog', JSON.stringify(log));
  } catch (e) {}
}

/* =====================================================================
   Render modules from CONTENT
   ===================================================================== */
const contentEl = document.getElementById('content');
const tocItems = document.querySelectorAll('.toc-item');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* 把相对路径 / 绝对路径 / 外链 都解析成当前仓库根目录下的完整 URL
 * - 已是 http(s):// 开头：原样返回
 * - 相对路径：基于「仓库根」(origin + 第一段非 .html 路径) 解析
 *
 * 关键：GitHub Pages 项目页的根 = origin + /仓库名/ ；
 *      GitHub Pages 用户主页的根 = origin
 *      通过检查第一段是否带 .html 区分（项目仓库名不会含 .html） */
function resolveUrl(url) {
  if (!url) return '';
  // 已是绝对 URL，直接返回
  if (/^https?:\/\//i.test(url)) return url;

  // 计算仓库根 URL
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  let repoRoot = window.location.origin + '/';
  // 找第一个"不是 .html 文件"的部分作为仓库名
  const firstNonFile = pathParts.find(p => !p.includes('.html') && !p.includes('.'));
  if (firstNonFile) {
    repoRoot = window.location.origin + '/' + firstNonFile + '/';
  }

  try {
    return new URL(url, repoRoot).href;
  } catch(e) {
    return url;
  }
}

function renderModule(key) {
  const mod = CONTENT[key];
  if (!mod) return '';
  const introParas = mod.intro.paragraphs.map(p => `<p class="lead">${p}</p>`).join('');
  const pdfTiles = (mod.pdfs || [])
    .filter(p => p && p.url && p.url.trim())    /* 只显示有 url 的项 */
    .map(p => `
    <a class="pdf-tile"
       href="${escapeHtml(resolveUrl(p.url))}"
       target="_blank"
       rel="noopener"
       data-pdf-id="${escapeHtml(p.id)}"
       data-module-id="${escapeHtml(key)}"
       data-track-action="open_pdf">
      <div class="ico">📄</div>
      <div class="body">
        <div class="t2">${escapeHtml(p.title)}</div>
      </div>
    </a>
  `).join('');
  const videoTiles = (mod.videos || [])
    .filter(v => v && v.url && v.url.trim())    /* 只显示有 url 的项 */
    .map(v => {
      const coverUrl = v.cover ? resolveUrl(v.cover) : '';
      return `
    <a class="video-tile ${coverUrl ? 'has-cover' : ''}"
       href="${escapeHtml(resolveUrl(v.url))}"
       target="_blank"
       rel="noopener"
       data-video-id="${escapeHtml(v.id)}"
       data-module-id="${escapeHtml(key)}"
       data-video-url="${escapeHtml(v.url)}"
       data-title="${escapeHtml(v.title)}"
       data-track-action="open_video">
      <div class="cover"${coverUrl ? ` style="background-image: url('${escapeHtml(coverUrl)}');"` : ''}><div class="play">▶</div></div>
      <div class="body">
        <div class="t">${escapeHtml(v.title)}</div>
        <div class="meta">
          ${v.author ? `<span class="by">创作者：${escapeHtml(v.author)}</span>` : ''}
          ${v.intro ? `<span class="intro">${escapeHtml(v.intro)}</span>` : ''}
        </div>
      </div>
    </a>
  `;}).join('');

  return `
    <article class="module" id="mod-${key}" data-key="${key}">
      <div class="card reveal" id="${key}-intro">
        <h2>${escapeHtml(mod.intro.title)}</h2>
        ${introParas}
      </div>

      <div class="card reveal" id="${key}-pdf">
        <div class="sec-block">
          <div class="sec-label"><span class="dot"></span>PDF 学习手册</div>
          <div class="pdf-row">${pdfTiles || '<div class="empty">本模块暂无 PDF</div>'}</div>
        </div>
      </div>

      <div class="card reveal" id="${key}-video">
        <div class="sec-block">
          <div class="sec-label"><span class="dot"></span>趣味视频</div>
          <div class="video-row">${videoTiles || '<div class="empty">本模块暂无视频</div>'}</div>
        </div>
      </div>
    </article>
  `;
}

function renderAll() {
  const keys = ['diet','exercise','sleep','screen','habits','mental'];
  contentEl.innerHTML = keys.map(renderModule).join('');
  showModule(keys[0]);
  bindEvents();
  observeReveals();
}

function showModule(key) {
  const modules = document.querySelectorAll('.module');
  modules.forEach(m => m.classList.toggle('active', m.dataset.key === key));
  tocItems.forEach(t => t.classList.toggle('active', t.dataset.target === key));
  track({ type: 'view_module', module_id: key });
  window.scrollTo({
    top: document.querySelector('.stage').offsetTop - 80,
    behavior: 'smooth'
  });
}

/* =====================================================================
   Event bindings
   ===================================================================== */
function bindEvents() {
  tocItems.forEach(item => {
    item.addEventListener('click', () => showModule(item.dataset.target));
  });

  document.querySelectorAll('a.pdf-tile[data-track-action="open_pdf"]').forEach(a => {
    a.addEventListener('click', () => {
      track({
        type: 'open_pdf',
        module_id: a.dataset.moduleId,
        target_id: a.dataset.pdfId,
        href: a.href,
      });
    });
  });

  document.querySelectorAll('.video-tile[data-track-action="open_video"]').forEach(t => {
    t.addEventListener('click', (e) => {
      const url = t.dataset.videoUrl;
      /* mp4 等视频文件 → 阻止默认跳转，弹 modal 内嵌播放 */
      if (/\.(mp4|webm|mov|m3u8)(\?|$)/i.test(url)) {
        e.preventDefault();
        openVideo(t);
      }
      /* 外链 → 让 <a target="_blank"> 自动跳转，不 preventDefault */
      track({
        type: 'open_video',
        module_id: t.dataset.moduleId,
        target_id: t.dataset.videoId,
        href: url,
      });
    });
  });
}

/* =====================================================================
   Video modal + watch-duration tracking
   ===================================================================== */
const videoModal = document.getElementById('videoModal');
const videoTitle = document.getElementById('videoTitle');
const videoContent = document.getElementById('videoContent');
const closeVideo = document.getElementById('closeVideo');

let currentVideoEl = null;
let currentVideoMeta = null;
let watchSessionId = null;
let lastReportTs = 0;

function openVideo(tile) {
  const meta = {
    video_id: tile.dataset.videoId,
    module_id: tile.dataset.moduleId,
    title:    tile.dataset.title,
    url:      tile.dataset.videoUrl,
    poster:   tile.dataset.poster || '',
    duration: parseInt(tile.dataset.duration || '0', 10),
  };
  currentVideoMeta = meta;
  watchSessionId = 'sess-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();

  videoTitle.textContent = meta.title;

  if (!meta.url || meta.url === '#') {
    videoContent.innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:42px; margin-bottom:10px;">🎬</div>
        <div style="opacity:.75;">视频尚未上传</div>
        <div style="margin-top:8px; font-size:12px; opacity:.55;">${escapeHtml(meta.title)}</div>
      </div>`;
  } else if (/\.(mp4|webm|mov|m3u8)(\?|$)/i.test(meta.url)) {
    // 视频文件 → 内嵌播放
    videoContent.innerHTML = `
      <video id="vidEl" controls preload="metadata" poster="${escapeHtml(meta.poster || '')}"
             style="width:100%; height:100%; background:#000;"
             data-video-id="${escapeHtml(meta.video_id)}">
        <source src="${escapeHtml(resolveUrl(meta.url))}" />
        您的浏览器不支持 video 标签。
      </video>
    `;
    currentVideoEl = document.getElementById('vidEl');
    bindVideoTracking(currentVideoEl, meta);
  } else {
    // 外链（公众号文章 / B站 / YouTube 等）→ 跳转
    const isWechat = /mp\.weixin\.qq\.com/.test(meta.url);
    const desc = isWechat ? '点击下方按钮在微信中观看' : '点击下方按钮在新窗口打开';
    const btnText = isWechat ? '📱 在微信中打开' : '▶ 打开视频';
    videoContent.innerHTML = `
      <div style="text-align:center; padding: 40px 20px;">
        <div style="font-size:64px; margin-bottom:16px;">${isWechat ? '📱' : '🎬'}</div>
        <h3 style="margin: 0 0 12px 0; font-family: 'Ma Shan Zheng', cursive; font-size: 28px; color: var(--ink);">${escapeHtml(meta.title)}</h3>
        ${meta.desc ? `<p style="opacity:.7; margin: 0 0 24px 0;">${escapeHtml(meta.desc)}</p>` : ''}
        <a href="${escapeHtml(resolveUrl(meta.url))}" target="_blank" rel="noopener"
           style="display:inline-block; padding:12px 28px; background:var(--orange); color:#fff; border-radius:30px; text-decoration:none; font-size:16px; box-shadow:var(--shadow);">
          ${btnText}
        </a>
        <div style="margin-top:18px; font-size:12px; opacity:.5;">${desc}</div>
      </div>
    `;
    currentVideoEl = null;
  }

  track({
    type: 'open_video',
    module_id: meta.module_id,
    target_id: meta.video_id,
    session_id: watchSessionId,
  });

  videoModal.classList.add('open');
}

function bindVideoTracking(vid, meta) {
  vid.addEventListener('play',  () => reportWatch('play'));
  vid.addEventListener('pause', () => reportWatch('pause'));
  vid.addEventListener('seeked',() => reportWatch('seek'));
  vid.addEventListener('ended', () => reportWatch('end'));
  vid.addEventListener('timeupdate', () => {
    const now = Date.now();
    if (now - lastReportTs >= 10000) reportWatch('tick');
  });
}

function reportWatch(eventType) {
  if (!currentVideoEl || !currentVideoMeta) return;
  lastReportTs = Date.now();
  const v = currentVideoEl;
  const dur = v.duration || currentVideoMeta.duration || 0;
  const pos = v.currentTime || 0;
  const payload = {
    type: 'video_watch',
    session_id: watchSessionId,
    module_id: currentVideoMeta.module_id,
    target_id: currentVideoMeta.video_id,
    video_id: currentVideoMeta.video_id,
    event: eventType,
    positionSec: Math.round(pos * 10) / 10,
    durationSec: Math.round(dur * 10) / 10,
    percent: dur ? Math.min(100, Math.round((pos / dur) * 1000) / 10) : 0,
  };
  try {
    // 已无后端，改为本地日志
    const log = JSON.parse(localStorage.getItem('healthVideoLog') || '[]');
    log.push(Object.assign({ ts: Date.now() }, payload));
    if (log.length > 200) log.splice(0, log.length - 200);
    localStorage.setItem('healthVideoLog', JSON.stringify(log));
  } catch (e) {}
  if (TRACK_DEBUG) console.log('[video_watch]', payload);
}

function closeVM() {
  if (currentVideoEl && !currentVideoEl.paused) {
    reportWatch('close');
    currentVideoEl.pause();
  }
  videoContent.innerHTML = '';
  currentVideoEl = null;
  currentVideoMeta = null;
  videoModal.classList.remove('open');
}
closeVideo.addEventListener('click', closeVM);
videoModal.addEventListener('click', (e) => { if (e.target === videoModal) closeVM(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeVM(); });

/* =====================================================================
   Hash-based deep linking
   ===================================================================== */
function showModuleFromHash() {
  const hash = window.location.hash.replace('#', '');
  console.log('[debug] showModuleFromHash, hash =', hash);
  if (!hash) return false;
  const modKey = hash.split('-')[0];
  const valid = ['diet','exercise','sleep','screen','habits','mental'];
  if (!valid.includes(modKey)) {
    console.warn('[debug] hash 无效的 modKey:', modKey);
    return false;
  }
  console.log('[debug] 激活模块:', modKey);
  showModule(modKey);
  if (hash.includes('-')) {
    setTimeout(() => {
      const el = document.getElementById(hash);
      console.log('[debug] 滚动到', hash, '找到？', !!el);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 350);
  }
  return true;
}
window.addEventListener('hashchange', showModuleFromHash);

/* =====================================================================
   Scroll reveal
   ===================================================================== */
let io;
function observeReveals() {
  if (!io) {
    io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
  }
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
}

/* =====================================================================
   Boot
   ===================================================================== */
renderAll();
/* 既支持直接 #diet-intro 进入，也支持子模块 */
if (window.location.hash) showModuleFromHash();
/* 兜底：如果 hash 解析失败或模块没找到，确保至少激活一个 */
setTimeout(() => {
  if (!document.querySelector('.module.active')) {
    const hash = window.location.hash.replace('#', '');
    const modKey = hash.split('-')[0];
    const valid = ['diet','exercise','sleep','screen','habits','mental'];
    if (valid.includes(modKey)) {
      showModule(modKey);
    }
  }
}, 100);
</script>
